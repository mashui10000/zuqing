<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>租清 · iOS 入住资料</title><link rel="stylesheet" href="shared.css"/></head>
<body><main class="app ios" data-od-id="ios-tenant-profile"><header class="statusbar"><span>9:41</span><span class="status-icons"><i></i><i></i><i></i></span></header><nav class="topbar"><a class="icon-button" href="ios-tenant.html" aria-label="返回"><span class="chevron">‹</span></a><div class="topbar-title">入住资料</div><span class="icon-button" aria-hidden="true">租</span></nav>
<section class="content" data-od-id="ios-tenant-profile-content"><p class="eyebrow">入住资料邀请</p><h1 class="title">填写入住资料</h1><p class="subtitle">入住几人就填写几份资料，电话号码至少填写一位。</p><article class="surface invite-source"><span class="mark">房</span><span><strong class="list-title">房东邀请你补全资料</strong><small class="list-sub">姓名和身份证每人必填，儿童可不填手机号</small></span></article>
  <form class="surface profile-form" data-tenant-profile-form data-default-name="" data-default-mobile="" data-od-id="ios-tenant-profile-form"><div class="occupant-count-control"><div class="count-copy"><span><strong>入住人数</strong><small>自动生成同等数量的资料卡</small></span><select name="occupants" aria-label="入住人数"><option value="1" selected>1 人</option><option value="2">2 人</option><option value="3">3 人</option><option value="4">4 人</option><option value="5">5 人</option><option value="6">6 人</option></select></div></div><div class="privacy-panel"><strong>入住日期由房东确认</strong>租客只需填写住户人数与人员资料，不能修改入住日期。</div><div data-occupant-form-list></div><div class="form-error" data-profile-error role="alert" aria-live="polite"></div><button class="btn btn-primary btn-block" type="submit">提交 1 份资料给房东</button></form>
  <article class="surface profile-success hidden" data-profile-success><div class="success-mark">✓</div><h2>资料已提交</h2><p>房东端已更新为 <span data-success-count>1</span> 人入住，入住日期以房东确认记录为准。</p><a class="btn btn-primary btn-block" href="ios-tenant.html">返回租客端</a></article><div class="privacy-panel"><strong>提交与授权</strong>房东可查看并管理入住日期及本房间全部住户资料；至少保留一位有效手机号用于账单和紧急联系。</div>
</section><div class="toast"></div></main><script src="shared.js"></script></body></html>
