<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>租清 · iOS 新增房间</title><link rel="stylesheet" href="shared.css"/></head>
<body><main class="app ios" data-od-id="ios-room-create"><header class="statusbar"><span>9:41</span><span class="status-icons"><i></i><i></i><i></i></span></header><nav class="topbar"><a class="icon-button" href="../mobile-ios.html" aria-label="返回"><span class="chevron">‹</span></a><div class="topbar-title">新增房间</div><a class="text-link" href="ios-guide.html">指南</a></nav>
<section class="content create-room-content" data-od-id="ios-room-create-content"><p class="eyebrow">批量建房</p><h1 class="title">新增多个房间</h1><p class="subtitle">位置和统一收费只填一次，每个房间保存后仍可单独修改。</p>
  <form class="room-create-form" data-room-create-form data-od-id="ios-room-create-form">
    <article class="surface create-form-card"><label>小区 / 楼栋<input name="locationName" placeholder="填写所在小区或楼栋" autocomplete="off" data-od-id="ios-room-location-input"/></label><label>详细地址 <span class="optional-label">选填</span><input name="address" placeholder="街道、门牌号" autocomplete="off" data-od-id="ios-room-address-input"/></label><div class="floor-generator" data-floor-generator data-od-id="ios-floor-room-generator"><div class="floor-generator-head"><strong>按楼层生成</strong><small>楼层 + 两位序号</small></div><div class="floor-generator-list"><label><span>起始楼层</span><span class="floor-generator-control"><input class="mono-input" name="startFloor" inputmode="numeric" value="1"/><em>层</em></span></label><label><span>楼层数量</span><span class="floor-generator-control"><input class="mono-input" name="floorCount" inputmode="numeric" placeholder="填写"/><em>层</em></span></label><label><span>每层房间数</span><span class="floor-generator-control"><input class="mono-input" name="roomsPerFloor" inputmode="numeric" placeholder="填写"/><em>间</em></span></label></div><button class="btn btn-secondary btn-block" type="button" data-generate-floor-rooms>生成房间号</button><small class="floor-generator-preview" data-floor-preview aria-live="polite"></small></div><div class="form-divider"><span>或手动输入 / 调整</span></div><label>房间号 <span class="optional-label" data-room-count aria-live="polite">已识别 0 个</span><textarea name="roomNames" maxlength="10000" placeholder="每行填写一个房间号" autocomplete="off" data-od-id="ios-room-names-input"></textarea></label><small class="batch-helper">也可用逗号分隔；下方位置与收费会统一应用到全部房间。</small></article>
    <div class="section-head"><h2>每月收费</h2></div>
    <article class="surface create-form-card fee-input-grid"><label>月租（元）<input class="mono-input" name="rent" inputmode="decimal" placeholder="0" data-od-id="ios-rent-input"/></label><label>押金（元）<input class="mono-input" name="deposit" inputmode="decimal" placeholder="0" data-od-id="ios-deposit-input"/></label><label>水费（元 / 吨）<input class="mono-input" name="waterRate" inputmode="decimal" placeholder="0" data-od-id="ios-water-rate-input"/></label><label>电费（元 / 度）<input class="mono-input" name="electricRate" inputmode="decimal" placeholder="0" data-od-id="ios-electric-rate-input"/></label>
      <div class="create-summary"><div class="between"><span>首次应收参考</span><strong class="mono" data-first-payment>¥0.00</strong></div><small>月租 + 押金；水电费抄表后按用量计算。</small></div>
    </article>
    <div class="form-error" data-room-create-error role="alert" aria-live="assertive"></div>
    <button class="btn btn-primary btn-block create-submit" type="submit" data-room-submit data-od-id="ios-create-room-submit">确认新增房间</button>
  </form>
  <article class="surface create-success hidden" data-room-create-success data-od-id="ios-room-create-success"><div class="success-mark">✓</div><h2 data-room-success-title>房间已新增</h2><p>统一收费已保存，仍可在房间资料中逐个修改。</p><a class="btn btn-primary btn-block" href="ios-room-profile.html">查看全部房间</a></article>
</section><div class="toast"></div></main><script src="shared.js"></script></body></html>
