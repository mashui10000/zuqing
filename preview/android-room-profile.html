<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>租清 · Android 房间资料</title><link rel="stylesheet" href="shared.css"/></head>
<body><main class="app android" data-od-id="android-room-profile"><header class="statusbar"><span>9:41</span><span class="status-icons"><i></i><i></i><i></i></span></header><nav class="topbar"><a class="icon-button" href="../mobile-android.html" aria-label="返回" data-od-id="android-room-back"><span class="chevron">‹</span></a><div class="topbar-title">房间</div><a class="icon-button" href="android-room-create.html" aria-label="新增房间" data-od-id="android-room-add"><span style="font-size:22px">＋</span></a></nav>
<section class="content" aria-labelledby="android-room-profile-title" data-od-id="android-room-profile-content"><p class="eyebrow room-screen-eyebrow">房间管理</p><h1 class="title" id="android-room-profile-title" data-od-id="android-room-profile-title">全部房间</h1><p class="subtitle">位置、收费与入住资料集中在每个房间中管理。</p>
  <div class="room-filter-stack hidden" data-preview-room-filters data-od-id="android-room-filters"><div class="room-filter-group"><span class="room-filter-label">位置</span><div class="room-filter-scroll"><div class="room-filter-row" data-preview-room-location-filters></div></div></div><div class="room-filter-group"><span class="room-filter-label">状态</span><div class="room-filter-scroll"><div class="room-filter-row status-filter-row" data-preview-room-status-filters></div></div></div></div>
  <div class="room-preview-list hidden" data-preview-room-list data-od-id="android-room-list"></div>
  <article class="surface empty-state hidden" data-preview-room-filter-empty data-od-id="android-room-filter-empty"><h2>没有符合条件的房间</h2><p>换一个位置或状态，也可以直接查看全部房间。</p><button class="btn btn-plain" type="button" data-clear-room-filters data-od-id="android-clear-room-filters">查看全部房间</button></article>
  <article class="surface empty-state" data-preview-room-empty data-od-id="android-room-profile-empty"><span class="empty-mark">房</span><h2>还没有房间</h2><p>新增时可一次填写多个房间号，位置与统一收费只填一遍。</p><a class="btn btn-primary" href="android-room-create.html" data-od-id="android-room-empty-add">新增房间</a></article>
</section><div class="scrim" id="preview-room-edit-sheet" aria-hidden="true"><section class="sheet" role="dialog" aria-modal="true" aria-labelledby="android-room-edit-title" data-od-id="android-room-edit-dialog"><div class="sheet-handle" aria-hidden="true"></div><h2 id="android-room-edit-title" data-od-id="android-room-edit-title">修改当前房间</h2><form class="room-profile-edit-form" data-preview-room-edit-form novalidate><label>小区 / 楼栋<input name="locationName" autocomplete="off" required aria-describedby="android-room-edit-error" data-od-id="android-room-edit-location"/></label><label>详细地址 <span class="optional-label">选填</span><input name="address" autocomplete="off" data-od-id="android-room-edit-address"/></label><label>房间号<input name="roomName" autocomplete="off" required aria-describedby="android-room-edit-error" data-od-id="android-room-edit-name"/></label><div class="room-profile-fee-grid"><label>月租（元）<input class="mono-input" name="rent" type="number" inputmode="decimal" min="0" step="0.01" aria-describedby="android-room-edit-error" data-od-id="android-room-edit-rent"/></label><label>押金（元）<input class="mono-input" name="deposit" type="number" inputmode="decimal" min="0" step="0.01" aria-describedby="android-room-edit-error" data-od-id="android-room-edit-deposit"/></label><label>水费（元 / 吨）<input class="mono-input" name="waterRate" type="number" inputmode="decimal" min="0" step="0.01" aria-describedby="android-room-edit-error" data-od-id="android-room-edit-water"/></label><label>电费（元 / 度）<input class="mono-input" name="electricRate" type="number" inputmode="decimal" min="0" step="0.01" aria-describedby="android-room-edit-error" data-od-id="android-room-edit-electric"/></label></div><small class="batch-helper">入住日期可在房间卡片直接选择；本面板修改只影响当前房间。</small><div class="form-error" id="android-room-edit-error" data-room-edit-error role="alert" aria-live="assertive"></div><div class="sheet-actions"><button class="btn btn-primary btn-block" type="submit" data-room-edit-submit data-od-id="android-room-edit-save">保存当前房间</button><button class="btn btn-plain btn-block" type="button" data-close-sheet aria-label="取消修改当前房间" data-od-id="android-room-edit-cancel">取消</button></div></form></section></div><nav class="bottom-nav" aria-label="房东端主导航" data-od-id="android-room-nav"><a class="nav-item" href="../mobile-android.html"><i class="nav-dot"></i>工作台</a><button class="nav-item active" aria-current="page" disabled><i class="nav-dot"></i>房间</button><a class="nav-item" href="android-bills.html"><i class="nav-dot"></i>账单</a><button class="nav-item" type="button" data-toast="暂无月结数据"><i class="nav-dot"></i>月结</button><a class="nav-item" href="android-login.html"><i class="nav-dot"></i>我的</a></nav><div class="toast"></div></main><script src="shared.js"></script></body></html>
